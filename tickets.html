  <style>
    .filter-bar { display:flex; gap:12px; align-items:center; margin-bottom:22px; flex-wrap:wrap; }
    .filter-select { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:var(--radius-xs); padding:9px 14px; font-size:13px; font-family:var(--font-body); outline:none; transition:border-color .2s, box-shadow .2s; }
    .filter-select:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-muted); }
    .search-inline { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:var(--radius-xs); padding:9px 14px; font-size:13px; font-family:var(--font-body); outline:none; width:220px; transition:border-color .2s, box-shadow .2s; }
    .search-inline:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-muted); }
    .tab-bar { display:flex; gap:10px; margin-bottom:var(--layout-gap, 20px); flex-wrap:wrap; }
    .tab { padding:9px 18px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; background:var(--surface); border:1px solid var(--border); color:var(--text-muted); transition:background .2s, border-color .2s, color .2s, transform .2s; letter-spacing:-.01em; }
    .tab:hover { background:var(--surface2); color:var(--text); border-color:color-mix(in srgb, var(--border) 80%, var(--primary-muted)); }
    .tab.active { background:var(--primary); border-color:var(--primary); color:#fff; box-shadow:var(--shadow-xs); }
    .ticket-count { background:var(--surface2); border:1px solid var(--border); padding:3px 9px; border-radius:100px; font-size:11px; font-weight:700; color:var(--text-muted); margin-left:6px; }
    #new-ticket-modal, #edit-ticket-modal { display:none; position:fixed; inset:0; background:rgba(12,17,29,.45); backdrop-filter:blur(6px); z-index:200; align-items:center; justify-content:center; padding:20px; animation:modalBg .25s ease; }
    #new-ticket-modal.open, #edit-ticket-modal.open { display:flex; }
    @keyframes modalBg { from { opacity:0; } to { opacity:1; } }
    .form-error { font-size:12px; color:var(--accent); margin-top:4px; min-height:18px; }
    .ticket-actions { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
    .assignee-cell { min-width: 0; }
    .assignee-cell .assignee-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
    .sla-badge.status-open { color: var(--accent2); background: color-mix(in srgb, var(--accent2) 14%, transparent); }
    .modal-box { background:var(--surface); border:1px solid var(--border-subtle); border-radius:var(--radius); padding:28px; width:440px; max-width:95vw; box-shadow:var(--shadow-lg); animation:modalIn .35s cubic-bezier(0.4,0,0.2,1) both; }
    @keyframes modalIn { from { opacity:0; transform:scale(.96) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .modal-box h3 { font-family:var(--font-head); font-size:18px; font-weight:600; letter-spacing:-.02em; margin-bottom:20px; }
    .form-row { display:flex; flex-direction:column; gap:7px; margin-bottom:16px; }
    .form-row label { font-size:12px; font-weight:600; color:var(--text-muted); }
    .form-row input, .form-row select, .form-row textarea { background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:var(--radius-xs); padding:10px 14px; font-size:13px; font-family:var(--font-body); outline:none; transition:border-color .2s, box-shadow .2s; }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-muted); }
    .form-row textarea { resize:vertical; min-height:88px; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:12px; }
  </style>

<script>
// Theme
const html = document.documentElement;
const saved = localStorage.getItem('theme');
if (saved) html.dataset.theme = saved;
document.getElementById('theme-toggle')?.addEventListener('click', () => {
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? '' : 'dark';
  localStorage.setItem('theme', isDark ? '' : 'dark');
});

let currentTab = 'all';
let ticketsStore = Array.isArray(DB.tickets) ? DB.tickets : [];

function isoNow() {
  return new Date().toISOString();
}

function ensureTicketDateFields(list) {
  const src = Array.isArray(list) ? list : [];
  const baseTs = Date.now();
  let changed = false;
  const normalized = src.map((t, idx) => {
    const next = { ...t };
    if (!next.createdAt) {
      const offsetHours = (src.length - idx) * 6;
      next.createdAt = new Date(baseTs - offsetHours * 3600000).toISOString();
      changed = true;
    }
    if (String(next.status || '').toLowerCase() === 'resolved') {
      if (!next.resolvedAt) {
        next.resolvedAt = isoNow();
        changed = true;
      }
    } else if (next.resolvedAt) {
      next.resolvedAt = null;
      changed = true;
    }
    return next;
  });
  return { normalized, changed };
}

function syncTicketsState(list) {
  const { normalized } = ensureTicketDateFields(list);
  ticketsStore = normalized;
  DB.tickets = ticketsStore;
}

function apiErrorUserMessage(res, fallbackLabel) {
  if (res.status === 0) {
    const hint =
      ' Si vous êtes sur le site en ligne, supprimez la clé localStorage « ti_api_base » si elle pointe vers localhost (F12 → Application → Stockage local).';
    if (res.error && String(res.error).trim()) {
      return 'Network error — ' + String(res.error).trim() + '.' + hint;
    }
    return 'Network error — vérifiez la connexion et l’URL de l’API.' + hint;
  }
  const d = res.data;
  const apiMsg = d && (d.message || (typeof d.error === 'string' ? d.error : null));
  if (typeof apiMsg === 'string' && apiMsg.trim()) return apiMsg.trim();
  return `${fallbackLabel} (HTTP ${res.status}).`;
}

async function ticketsRlsMode() {
  return (
    typeof ApiClient !== 'undefined' &&
    ApiClient.shouldUseTicketsRls &&
    (await ApiClient.shouldUseTicketsRls())
  );
}

async function hydrateTicketsFromApi() {
  if (typeof ApiClient === 'undefined') return;
  const localTickets = Array.isArray(DB.tickets) ? DB.tickets.slice() : [];

  if (await ticketsRlsMode()) {
    const res = await ApiClient.getTicketsRls();
    if (res.ok && Array.isArray(res.data)) {
      const { normalized } = ensureTicketDateFields(res.data);
      syncTicketsState(normalized);
      return;
    }
    if (!res.ok) {
      console.warn('[DiaTech] tickets-rls:', res.status, res.data);
    }
    return;
  }

  const remote = await ApiClient.getTickets();
  if (!Array.isArray(remote)) return;
  if (remote.length === 0 && localTickets.length > 0) {
    await ApiClient.bootstrap({ tickets: localTickets });
    const remoteAfterBootstrap = await ApiClient.getTickets();
    if (Array.isArray(remoteAfterBootstrap)) {
      syncTicketsState(remoteAfterBootstrap);
      return;
    }
  }
  const source = remote.length ? remote : localTickets;
  const { normalized, changed } = ensureTicketDateFields(source);
  syncTicketsState(normalized);
  if (changed) {
    normalized.forEach((t) => {
      void ApiClient.upsertTicket(t);
    });
  }
}

function fillAssigneeSelect() {
  const sel = document.getElementById('et-agent');
  if (!sel) return;
  if (typeof RoleUi !== 'undefined' && !RoleUi.canAssignTickets()) {
    sel.innerHTML = '<option value="">—</option>';
    return;
  }
  const users = getAssignableUsers();
  sel.innerHTML =
    '<option value="">Unassigned</option>' +
    users.map((u) => `<option value="${u.id}">${u.name}</option>`).join('');
}

function escDeptOpt(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;');
}

function fillDepartmentSelects() {
  const names = (Array.isArray(DB.departments) ? DB.departments : []).map((d) => d.name).filter(Boolean);
  const fill = (id, prefixHtml) => {
    const el = document.getElementById(id);
    if (!el) return;
    const v = el.value;
    el.innerHTML = prefixHtml + names.map((n) => `<option value="${escDeptOpt(n)}">${escDeptOpt(n)}</option>`).join('');
    if ([...el.options].some((o) => o.value === v)) el.value = v;
  };
  fill('filter-department', '<option value="">All departments</option>');
  fill('nt-department', '<option value="">— Select —</option>');
  fill('et-department', '<option value="">— None —</option>');
}

function priorityBadge(p) {
  return `<span class="priority-badge ${p}">${p.charAt(0).toUpperCase()+p.slice(1)}</span>`;
}
function slaBadge(sla, cls) { return `<span class="sla-badge ${cls}">${sla}</span>`; }

function safeHoursDelta(startIso, endIsoOrNow, targetHours) {
  const start = startIso ? new Date(startIso) : null;
  const end = endIsoOrNow ? new Date(endIsoOrNow) : new Date();
  if (!start || Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return null;
  const elapsed = (end.getTime() - start.getTime()) / 3600000;
  if (!Number.isFinite(elapsed)) return null;
  return Number(targetHours) - elapsed;
}

function ticketSlaMeta(ticket) {
  const fallbackLabel = ticket?.sla || '—';
  const fallbackClass = ticket?.slaClass || 'ok';
  const createdAt = ticket?.createdAt || null;
  if (!createdAt) return { label: fallbackLabel, cls: fallbackClass };

  const targetHours =
    typeof getSlaTargetHoursForDate === 'function'
      ? Number(getSlaTargetHoursForDate(createdAt)) || 4
      : 4;
  const isResolved = String(ticket?.status || '').toLowerCase() === 'resolved';
  const endAt = isResolved ? ticket?.resolvedAt || isoNow() : isoNow();
  const delta = safeHoursDelta(createdAt, endAt, targetHours);
  if (delta == null) return { label: fallbackLabel, cls: fallbackClass };

  const rounded = Math.ceil(Math.abs(delta));
  const label = `${delta >= 0 ? '+' : '-'}${rounded}h`;
  let cls = 'ok';
  if (delta < 0) cls = 'breach';
  else if (delta <= Math.max(1, targetHours * 0.25)) cls = 'warn';
  return { label, cls };
}

function statusBadge(status) {
  const s = status || 'open';
  let cls = 'status-open';
  let label = 'Open';
  if (s === 'in-progress') { cls = 'warn'; label = 'In Progress'; }
  if (s === 'resolved') { cls = 'ok'; label = 'Resolved'; }
  return `<span class="sla-badge ${cls}">${label}</span>`;
}

function assigneeCell(ticket) {
  const assignedUserId = ticket.assignedUserId;
  const canAssign = typeof RoleUi === 'undefined' || RoleUi.canAssignTickets();
  if (assignedUserId == null || assignedUserId === '') {
    if (!canAssign) {
      return '<span class="ticket-assign-placeholder" style="color:var(--text-muted);font-size:12px">—</span>';
    }
    const tid = Number(ticket.id);
    return `<button type="button" class="assign-btn" onclick="openEditTicket(${tid})">Assigner</button>`;
  }
  const u = getUserById(assignedUserId);
  const color = u?.avatarColor || '#64748b';
  const label = u?.name || 'Unknown user';
  const ini = u?.initials || '?';
  return `<div class="assignee-cell"><div class="tech-avatar" style="background:${color}" title="${label}">${ini}</div><span class="assignee-name">${label}</span></div>`;
}

function departmentCell(dept) {
  const d = String(dept || '').trim();
  if (!d) return '<span class="ticket-dept" style="color:var(--text-muted)">—</span>';
  return `<span class="ticket-dept">${escDeptOpt(d)}</span>`;
}

function renderTickets() {
  const tickets = ticketsStore;
  const search = document.getElementById('ticket-search').value.toLowerCase();
  const pFilter = document.getElementById('filter-priority').value;
  const sFilter = document.getElementById('filter-sla').value;
  const deptFilter = document.getElementById('filter-department')?.value || '';

  let filtered = tickets.filter(t => {
    const slaMeta = ticketSlaMeta(t);
    if (currentTab === 'open' && String(t.status || '').toLowerCase() !== 'open') return false;
    if (currentTab === 'in-progress' && String(t.status || '').toLowerCase() !== 'in-progress') return false;
    if (currentTab === 'critical' && t.priority !== 'critical') return false;
    if (currentTab === 'unassigned' && t.assignedUserId) return false;
    if (search && !t.title.toLowerCase().includes(search) && !String(t.id).includes(search) && !String(t.department || '').toLowerCase().includes(search)) return false;
    if (pFilter && t.priority !== pFilter) return false;
    if (sFilter && slaMeta.cls !== sFilter) return false;
    if (deptFilter && String(t.department || '').trim() !== deptFilter) return false;
    return true;
  });

  document.getElementById('tickets-full-body').innerHTML = filtered.map(t => `
    <tr>
      <td><span class="ticket-id">#${t.id}</span></td>
      <td class="ticket-name">${t.title}</td>
      <td>${departmentCell(t.department)}</td>
      <td>${assigneeCell(t)}</td>
      <td>${priorityBadge(t.priority)}</td>
      <td>${statusBadge(t.status)}</td>
      <td>${(() => { const s = ticketSlaMeta(t); return slaBadge(s.label, s.cls); })()}</td>
      <td class="ticket-actions">
        <button type="button" class="btn-secondary" style="font-size:11px;padding:4px 10px">View</button>
        <button type="button" class="btn-primary" style="font-size:11px;padding:4px 10px" data-edit-id="${t.id}">Edit</button>
      </td>
    </tr>
  `).join('');

  document.getElementById('cnt-all').textContent = tickets.length;
  document.getElementById('cnt-open').textContent = tickets.filter(t => String(t.status || '').toLowerCase() === 'open').length;
  document.getElementById('cnt-in-progress').textContent = tickets.filter(t => String(t.status || '').toLowerCase() === 'in-progress').length;
  document.getElementById('cnt-critical').textContent = tickets.filter(t=>t.priority==='critical').length;
  document.getElementById('cnt-unassigned').textContent = tickets.filter(t=>!t.assignedUserId).length;
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    renderTickets();
  });
});
document.getElementById('ticket-search').addEventListener('input', renderTickets);
document.getElementById('filter-priority').addEventListener('change', renderTickets);
document.getElementById('filter-sla').addEventListener('change', renderTickets);
document.getElementById('filter-department')?.addEventListener('change', renderTickets);

document.getElementById('tickets-full-body').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-edit-id]');
  if (btn) openEditTicket(Number(btn.dataset.editId));
});

function openEditTicket(id) {
  const t = DB.tickets.find(x => x.id === id);
  if (!t) return;
  document.getElementById('et-id').value = String(id);
  document.getElementById('et-title').value = t.title;
  document.getElementById('et-priority').value = t.priority;
  const etStatus = document.getElementById('et-status');
  etStatus.value = t.status || 'open';
  const canStatus = typeof RoleUi === 'undefined' || RoleUi.canUpdateTicketStatus();
  etStatus.disabled = !canStatus;
  etStatus.title = canStatus ? '' : 'Seuls agent et admin peuvent modifier le statut.';
  fillAssigneeSelect();
  document.getElementById('et-agent').value =
    t.assignedUserId != null && getUserById(t.assignedUserId) ? String(t.assignedUserId) : '';
  const assignRow = document.getElementById('et-agent')?.closest('.form-row');
  const canAssign = typeof RoleUi === 'undefined' || RoleUi.canAssignTickets();
  if (assignRow) {
    assignRow.hidden = !canAssign;
    assignRow.style.display = canAssign ? '' : 'none';
  }
  const etDept = document.getElementById('et-department');
  if (etDept) {
    const dn = String(t.department || '').trim();
    etDept.value = [...etDept.options].some((o) => o.value === dn) ? dn : '';
  }
  document.getElementById('edit-form-error').textContent = '';
  document.getElementById('edit-ticket-modal').classList.add('open');
}

window.closeEditTicketModal = function() {
  document.getElementById('edit-ticket-modal').classList.remove('open');
  document.getElementById('edit-form-error').textContent = '';
};

window.saveEditTicket = async function() {
  const errEl = document.getElementById('edit-form-error');
  errEl.textContent = '';
  const id = Number(document.getElementById('et-id').value);
  const t = DB.tickets.find((x) => x.id === id);
  if (!t) {
    errEl.textContent = 'Ticket not found.';
    return;
  }
  const canAssignRole = typeof RoleUi === 'undefined' || RoleUi.canAssignTickets();
  const title = document.getElementById('et-title').value.trim();
  const priority = document.getElementById('et-priority').value;
  const canUpdateStatus = typeof RoleUi === 'undefined' || RoleUi.canUpdateTicketStatus();
  const status = canUpdateStatus
    ? document.getElementById('et-status').value
    : t.status || 'open';
  const agentVal = canAssignRole ? document.getElementById('et-agent').value : '';

  if (!title) {
    errEl.textContent = 'Title cannot be empty.';
    return;
  }
  if (!priority) {
    errEl.textContent = 'Please select a priority.';
    return;
  }
  if (!status) {
    errEl.textContent = 'Please select a status.';
    return;
  }

  let assignedUserId = t.assignedUserId;
  if (canAssignRole) {
    assignedUserId = null;
    if (agentVal !== '') {
      const uid = Number(agentVal);
      const assignable = getAssignableUsers().some((u) => u.id === uid);
      if (!assignable || !getUserById(uid)) {
        errEl.textContent = 'Please select a valid user.';
        return;
      }
      assignedUserId = uid;
    }
  }

  const deptVal = document.getElementById('et-department')?.value?.trim() || '';
  const prev = {
    title: t.title,
    priority: t.priority,
    status: t.status,
    assignedUserId: t.assignedUserId,
    resolvedAt: t.resolvedAt,
    createdAt: t.createdAt,
    department: t.department,
  };
  t.title = title;
  t.priority = priority;
  t.status = status;
  t.assignedUserId = assignedUserId;
  t.department = deptVal || null;
  if (status === 'resolved') {
    if (!t.resolvedAt) t.resolvedAt = isoNow();
  } else {
    t.resolvedAt = null;
  }
  if (!t.createdAt) t.createdAt = isoNow();

  const useRls = await ticketsRlsMode();
  let res;
  if (useRls && ApiClient.upsertTicketRlsWithResult) {
    const body = {
      id: t.id,
      title: t.title,
      priority: t.priority,
      status: t.status,
      assignedUserId: t.assignedUserId,
      department: t.department,
      resolvedAt: t.resolvedAt,
      createdAt: t.createdAt,
      sla: t.sla,
      slaClass: t.slaClass,
    };
    if (canAssignRole) {
      if (agentVal === '') body.assigneeCleared = true;
      else {
        const au = getUserById(Number(agentVal));
        if (au && au.email) body.assigneeEmail = String(au.email).trim();
      }
    }
    res = await ApiClient.upsertTicketRlsWithResult(body);
  } else if (typeof ApiClient !== 'undefined' && ApiClient.upsertTicketWithResult) {
    res = await ApiClient.upsertTicketWithResult(t);
  } else if (typeof ApiClient !== 'undefined') {
    await ApiClient.upsertTicket(t);
    res = { ok: true };
  } else {
    res = { ok: true };
  }
  if (res && !res.ok) {
    Object.assign(t, prev);
    errEl.textContent = apiErrorUserMessage(res, 'Save failed');
    return;
  }

  if (typeof window.diatechNotifyDataChanged === 'function') window.diatechNotifyDataChanged('tickets');

  closeEditTicketModal();
  renderTickets();
};

document.getElementById('edit-ticket-modal').addEventListener('click', (e) => {
  if (e.target.id === 'edit-ticket-modal') closeEditTicketModal();
});

window.submitNewTicket = async function() {
  const errEl = document.getElementById('nt-form-error');
  if (errEl) errEl.textContent = '';
  const title = document.getElementById('nt-title').value.trim();
  const priority = document.getElementById('nt-priority').value;
  const department = document.getElementById('nt-department')?.value?.trim() || '';
  if (!title) return;
  if (!department) {
    if (errEl) errEl.textContent = 'Please select a department.';
    return;
  }
  const nextId = ticketsStore.reduce((m, x) => Math.max(m, Number(x.id) || 0), 0) + 1;
  const newTicket = {
    id: nextId,
    title,
    priority,
    status: 'open',
    sla: '+7d',
    slaClass: 'ok',
    assignedUserId: null,
    department,
    createdAt: isoNow(),
    resolvedAt: null
  };

  const useRls = await ticketsRlsMode();
  let res;
  if (useRls && ApiClient.upsertTicketRlsWithResult) {
    res = await ApiClient.upsertTicketRlsWithResult(newTicket);
  } else if (typeof ApiClient !== 'undefined' && ApiClient.upsertTicketWithResult) {
    res = await ApiClient.upsertTicketWithResult(newTicket);
  } else if (typeof ApiClient !== 'undefined') {
    await ApiClient.upsertTicket(newTicket);
    res = { ok: true };
  } else {
    res = { ok: true };
  }
  if (res && !res.ok) {
    if (errEl) errEl.textContent = apiErrorUserMessage(res, 'Create failed');
    return;
  }

  ticketsStore.unshift(newTicket);
  DB.tickets = ticketsStore;
  if (typeof window.diatechNotifyDataChanged === 'function') window.diatechNotifyDataChanged('tickets');
  document.getElementById('new-ticket-modal').classList.remove('open');
  document.getElementById('nt-title').value = '';
  const ntDept = document.getElementById('nt-department');
  if (ntDept) ntDept.value = '';
  renderTickets();
};

function applyTicketUrlFilters() {
  const params = new URLSearchParams(window.location.search);
  const dept = params.get('department');
  if (dept) {
    const title = document.querySelector('.page-title');
    if (title) title.textContent = `Tickets - ${dept}`;
  }
  const pr = params.get('priority');
  if (pr) {
    const sel = document.getElementById('filter-priority');
    if (sel && [...sel.options].some(o => o.value === pr)) sel.value = pr;
  }
  const sla = params.get('sla');
  if (sla) {
    const sel = document.getElementById('filter-sla');
    if (sel && [...sel.options].some(o => o.value === sla)) sel.value = sla;
  }
  const dpt = params.get('department');
  if (dpt) {
    const sel = document.getElementById('filter-department');
    if (sel && [...sel.options].some((o) => o.value === dpt)) sel.value = dpt;
  }
}

void (async function bootTicketsPage() {
  try {
    await Auth.guard();
  } catch (e) {
    console.error(e);
  }
  fillAssigneeSelect();
  fillDepartmentSelects();
  applyTicketUrlFilters();
  await hydrateTicketsFromApi();
  fillDepartmentSelects();
  applyTicketUrlFilters();
  renderTickets();
  if (typeof Auth !== 'undefined' && Auth.enhanceUI) Auth.enhanceUI();
})();
document.getElementById('nt-submit')?.addEventListener('click', () => void submitNewTicket());
document.getElementById('et-submit')?.addEventListener('click', () => void saveEditTicket());
</script>
