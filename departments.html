<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DiaTech – Départements</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    .dept-cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(min(100%, 280px), 1fr)); gap:var(--layout-gap, 20px); }
    .dept-card { background:var(--surface); border:1px solid var(--border-subtle); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow-sm); transition:box-shadow .25s, border-color .25s, transform .25s; min-width:0; }
    .dept-card:hover { box-shadow:var(--shadow-md); border-color:color-mix(in srgb, var(--border) 85%, var(--primary-muted)); }
    .dept-card-head { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .dept-logo { width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-weight:800; font-size:16px; color:#fff; }
    .dept-card-name { font-family:var(--font-head); font-size:15px; font-weight:700; }
    .dept-card-services { font-size:11px; color:var(--text-muted); font-weight:500; margin-top:2px; }
    .service-chip { display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; border:1px solid var(--border); background:var(--surface2); font-size:10px; margin-right:6px; margin-top:4px; }
    .dept-stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(min(100%, 72px), 1fr)); gap:var(--layout-gap, 12px); }
    .dept-stat { background:var(--surface2); border-radius:8px; padding:10px; text-align:center; }
    .dept-stat-btn {
      border:1px solid transparent;
      width:100%;
      cursor:pointer;
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
    }
    .dept-stat-btn:hover {
      transform:translateY(-1px);
      border-color:var(--border);
      box-shadow:var(--shadow-sm);
    }
    .dept-stat-btn:focus-visible {
      outline:none;
      border-color:var(--accent2);
      box-shadow:0 0 0 3px color-mix(in srgb, var(--accent2) 24%, transparent);
    }
    .dept-stat--alerts { position:relative; }
    .ack-mini-btn {
      position:absolute;
      top:6px;
      right:6px;
      width:22px;
      height:22px;
      border-radius:999px;
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
    }
    .ack-mini-btn:hover { background:color-mix(in srgb, var(--surface2) 82%, white 18%); }
    .dept-stat-val { font-family:var(--font-head); font-size:18px; font-weight:700; }
    .dept-stat-label { font-size:10px; color:var(--text-muted); font-weight:500; margin-top:2px; }
    .add-department-btn { margin-bottom:20px; }
    #add-dept-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; align-items:center; justify-content:center; }
    #add-dept-modal.open { display:flex; }
    .modal-box { background:var(--surface); border-radius:16px; padding:28px; width:420px; max-width:95vw; box-shadow:var(--shadow-lg); }
    .modal-box h3 { font-family:var(--font-head); font-size:18px; margin-bottom:18px; }
    .form-row { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
    .form-row label { font-size:12px; font-weight:600; color:var(--text-muted); }
    .form-row input, .form-row select { background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:9px 12px; font-size:13px; font-family:var(--font-body); outline:none; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
  </style>
</head>
<body>

    <div class="sidebar-avatar">··</div>

  </div>

<main class="main-content">
  <div class="container">
  <header class="topbar header">
    <div class="topbar-left header-left"><h1 class="page-title">Départements</h1></div>
    <div class="topbar-right header-right">
      <button class="btn-primary add-department-btn" onclick="document.getElementById('add-dept-modal').classList.add('open')">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter département
      </button>
    </div>
  </header>
  <div class="content-pad">
    <h3 style="margin-bottom:12px">Liste des départements</h3>
    <div class="dept-cards" id="dept-cards"></div>
  </div>
  </div>
</main>

<div id="add-dept-modal">
  <div class="modal-box">
    <h3>Ajouter département</h3>
    <div class="form-row"><label>Nom du département</label><input type="text" id="dn-name" placeholder="Urgences"/></div>
    <div class="form-row"><label>Services (optionnel)</label><input type="text" id="dn-services" placeholder="Consultation, Suivi, Urgence"/></div>
    <div class="form-row"><label>Email de contact</label><input type="email" id="dn-email" placeholder="admin@cmd.local"/></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="document.getElementById('add-dept-modal').classList.remove('open')">Annuler</button>
      <button class="btn-primary" onclick="addDepartment()">Ajouter département</button>
    </div>
  </div>
</div>

<script>
const html = document.documentElement;
if(localStorage.getItem('theme')) html.dataset.theme = localStorage.getItem('theme');
document.getElementById('theme-toggle')?.addEventListener('click',()=>{
  const d=html.dataset.theme==='dark'; html.dataset.theme=d?'':'dark'; localStorage.setItem('theme',d?'':'dark');
});

const colors = ['#f43f5e','#3b82f6','#10b981','#8b5cf6','#f59e0b'];
const DEPARTMENT_DEVICE_STORAGE_KEY = 'cmd_department_devices_v1';
function withDepartmentColors(list) {
  return (Array.isArray(list) ? list : []).map((d, i) => ({ ...d, color: d.color || colors[i % colors.length] }));
}
let departments = withDepartmentColors(DB.departments);
let departmentDevices = loadDepartmentDevices();

function normDeptName(s) {
  return String(s || '').trim().toLowerCase();
}

function openTicketsInDepartment(deptName) {
  const key = normDeptName(deptName);
  return (Array.isArray(DB.tickets) ? DB.tickets : []).filter((t) => {
    if (String(t?.status || '').toLowerCase() === 'resolved') return false;
    return normDeptName(t?.department) === key;
  });
}

function ticketSlaClassForDeptPage(ticket) {
  const createdAt = ticket?.createdAt || null;
  if (!createdAt) return String(ticket?.slaClass || 'ok').toLowerCase() === 'breach' ? 'breach' : 'ok';
  const targetHours =
    typeof getSlaTargetHoursForDate === 'function' ? Number(getSlaTargetHoursForDate(createdAt)) || 4 : 4;
  const isResolved = String(ticket?.status || '').toLowerCase() === 'resolved';
  const endAt = isResolved ? (ticket?.resolvedAt ? new Date(ticket.resolvedAt) : new Date()) : new Date();
  const start = new Date(createdAt);
  if (Number.isNaN(start.getTime()) || Number.isNaN(endAt.getTime())) {
    return String(ticket?.slaClass || 'ok').toLowerCase() === 'breach' ? 'breach' : 'ok';
  }
  const elapsed = (endAt.getTime() - start.getTime()) / 3600000;
  const delta = targetHours - elapsed;
  if (delta < 0) return 'breach';
  if (delta <= Math.max(1, targetHours * 0.25)) return 'warn';
  return 'ok';
}

function alertCountForDepartment(deptName) {
  return openTicketsInDepartment(deptName).filter((t) => {
    const cls = ticketSlaClassForDeptPage(t);
    return t.priority === 'critical' || cls === 'breach' || cls === 'warn';
  }).length;
}

function deviceCountForDepartment(deptName) {
  const key = normDeptName(deptName);
  let n = 0;
  (Array.isArray(DB.inventory) ? DB.inventory : []).forEach((item) => {
    if (normDeptName(item?.department) === key) n++;
  });
  const devList = DB.devices;
  if (Array.isArray(devList)) {
    devList.forEach((d) => {
      if (normDeptName(d?.department) === key) n++;
    });
  }
  if (n === 0) {
    n = departmentDevices.filter((x) => normDeptName(x?.department) === key).length;
  }
  return n;
}

function openTicketCountForDepartment(deptName) {
  return openTicketsInDepartment(deptName).length;
}

async function hydrateDepartmentsAndDevicesFromApi() {
  if (typeof ApiClient === 'undefined') return;
  const localDepartments = Array.isArray(DB.departments) ? DB.departments.slice() : [];
  const localDevices = Array.isArray(departmentDevices) ? departmentDevices.slice() : [];
  const localTickets = Array.isArray(DB.tickets) ? DB.tickets.slice() : [];
  const localInventory = Array.isArray(DB.inventory) ? DB.inventory.slice() : [];

  const pack = await ApiClient.getAppData();
  let remoteDepartments;
  let remoteDevices;
  if (pack && typeof pack === 'object') {
    if (Array.isArray(pack.departments)) DB.departments = pack.departments;
    if (Array.isArray(pack.tickets)) DB.tickets = pack.tickets;
    if (Array.isArray(pack.inventory)) DB.inventory = pack.inventory;
    if (Array.isArray(pack.devices)) DB.devices = pack.devices;
    remoteDepartments = DB.departments;
    remoteDevices = Array.isArray(DB.devices) ? DB.devices : [];
  } else {
    const [rd, rdev, remoteTickets] = await Promise.all([
      ApiClient.getDepartments(),
      ApiClient.getDevices(),
      ApiClient.getTickets(),
    ]);
    remoteDepartments = rd;
    remoteDevices = rdev;
    if (Array.isArray(remoteDepartments) && remoteDepartments.length) DB.departments = remoteDepartments;
    if (Array.isArray(remoteDevices) && remoteDevices.length) {
      DB.devices = remoteDevices;
      departmentDevices = remoteDevices;
      try {
        localStorage.setItem(DEPARTMENT_DEVICE_STORAGE_KEY, JSON.stringify(departmentDevices));
      } catch (_e) {}
    }
    if (Array.isArray(remoteTickets)) DB.tickets = remoteTickets;
  }

  const hasRemoteDepartments = Array.isArray(remoteDepartments) && remoteDepartments.length > 0;
  const hasRemoteDevices = Array.isArray(remoteDevices) && remoteDevices.length > 0;

  const shouldBootstrap =
    !hasRemoteDepartments &&
    !hasRemoteDevices &&
    (localDepartments.length > 0 || localDevices.length > 0 || localTickets.length > 0 || localInventory.length > 0);
  if (shouldBootstrap) {
    await ApiClient.bootstrap({
      departments: localDepartments,
      devices: localDevices,
      tickets: localTickets,
      inventory: localInventory,
    });
    const pack2 = await ApiClient.getAppData();
    if (pack2 && typeof pack2 === 'object') {
      if (Array.isArray(pack2.departments)) DB.departments = pack2.departments;
      if (Array.isArray(pack2.tickets)) DB.tickets = pack2.tickets;
      if (Array.isArray(pack2.inventory)) DB.inventory = pack2.inventory;
      if (Array.isArray(pack2.devices)) DB.devices = pack2.devices;
    }
  }

  if (Array.isArray(DB.departments) && DB.departments.length) {
    departments = withDepartmentColors(DB.departments);
  } else {
    departments = withDepartmentColors(localDepartments);
  }

  const devFromDb = DB.devices;
  if (Array.isArray(devFromDb) && devFromDb.length) {
    departmentDevices = devFromDb;
    try {
      localStorage.setItem(DEPARTMENT_DEVICE_STORAGE_KEY, JSON.stringify(departmentDevices));
    } catch (_e) {}
  }
}

function departmentUrl(page, name, extra) {
  const qp = new URLSearchParams({ department: name });
  if (extra) Object.keys(extra).forEach((k) => qp.set(k, String(extra[k])));
  return `${page}?${qp.toString()}`;
}

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/"/g, '&quot;');
}

function renderDepartments() {
  document.getElementById('dept-cards').innerHTML = departments.map(d => {
    const ticketCount = openTicketCountForDepartment(d.name);
    const alertCount = alertCountForDepartment(d.name);
    const deviceCount = deviceCountForDepartment(d.name);
    const services = Array.isArray(d.services) && d.services.length
      ? `<div class="dept-card-services">${d.services.map(s => `<span class="service-chip">${escHtml(s)}</span>`).join('')}</div>`
      : `<div class="dept-card-services">Sans service spécifique</div>`;
    const initial = escHtml((d.name || '?').charAt(0));
    return `
    <div class="dept-card">
      <div class="dept-card-head">
        <div class="dept-logo" style="background:${d.color}">${initial}</div>
        <div>
          <div class="dept-card-name">${escHtml(d.name)}</div>
          ${services}
        </div>
      </div>
      <div class="dept-stats">
        <button type="button" class="dept-stat dept-stat-btn" onclick="window.location.href='${departmentUrl("tickets.html", d.name)}'">
          <div class="dept-stat-val">${ticketCount}</div>
          <div class="dept-stat-label">Tickets</div>
        </button>
        <div class="dept-stat dept-stat-btn dept-stat--alerts" role="button" tabindex="0" onclick="window.location.href='${departmentUrl("alerts.html", d.name)}'" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();window.location.href='${departmentUrl("alerts.html", d.name)}';}">
          <div class="dept-stat-val">${alertCount}</div>
          <div class="dept-stat-label">Alertes</div>
          <button type="button" class="ack-mini-btn" title="Acquitter alertes" onclick="event.stopPropagation();window.location.href='${departmentUrl("alerts.html", d.name, {ack: 1})}'">✓</button>
        </div>
        <button type="button" class="dept-stat dept-stat-btn" onclick="window.location.href='${departmentUrl("devices.html", d.name)}'">
          <div class="dept-stat-val">${deviceCount}</div>
          <div class="dept-stat-label">Appareils</div>
        </button>
      </div>
    </div>
  `;
  }).join('');
}

window.addDepartment = function() {
  const name = document.getElementById('dn-name').value.trim();
  if(!name) return;
  const servicesRaw = document.getElementById('dn-services').value.trim();
  const services = servicesRaw ? servicesRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
  const nextDepartment = { name, tickets: 0, services, color: colors[departments.length % colors.length] };
  departments.push(nextDepartment);
  DB.departments = departments;
  if (typeof ApiClient !== 'undefined') void ApiClient.upsertDepartment(nextDepartment);
  document.getElementById('add-dept-modal').classList.remove('open');
  document.getElementById('dn-name').value = '';
  document.getElementById('dn-services').value = '';
  renderDepartments();
};

function defaultDepartmentDevices() {
  return [
    { id: 1, name: 'PC-DIR-01', type: 'PC', ip: '192.168.10.11', department: 'Direction', status: 'online' },
    { id: 2, name: 'PC-SEC-01', type: 'PC', ip: '192.168.10.21', department: 'Secretariat', status: 'online' },
    { id: 3, name: 'MAC-MED-01', type: 'Mac', ip: '192.168.11.40', department: 'Médical', status: 'online' },
    { id: 4, name: 'LAP-RC-01', type: 'Laptop', ip: '192.168.11.71', department: 'Relation contractuelle', status: 'offline' },
    { id: 5, name: 'SRV-IT-01', type: 'Server', ip: '192.168.20.10', department: 'IT', status: 'online' }
  ];
}

function loadDepartmentDevices() {
  try {
    const raw = localStorage.getItem(DEPARTMENT_DEVICE_STORAGE_KEY);
    if (!raw) return defaultDepartmentDevices();
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : defaultDepartmentDevices();
  } catch (_) {
    return defaultDepartmentDevices();
  }
}

let deptRefreshTimer = null;
async function refreshDepartmentsFromServer() {
  await hydrateDepartmentsAndDevicesFromApi();
  departments = withDepartmentColors(Array.isArray(DB.departments) ? DB.departments : departments);
  renderDepartments();
}
function scheduleDepartmentsRefresh() {
  if (deptRefreshTimer) clearTimeout(deptRefreshTimer);
  deptRefreshTimer = setTimeout(() => {
    deptRefreshTimer = null;
    if (typeof ApiClient === 'undefined') return;
    void refreshDepartmentsFromServer();
  }, 450);
}

renderDepartments();
void refreshDepartmentsFromServer();

window.addEventListener('diatech:data-changed', () => scheduleDepartmentsRefresh());
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') scheduleDepartmentsRefresh();
});
window.addEventListener('pageshow', (ev) => {
  if (ev.persisted) scheduleDepartmentsRefresh();
});
window.addEventListener('focus', () => scheduleDepartmentsRefresh());

setInterval(() => {
  if (document.visibilityState === 'visible' && typeof ApiClient !== 'undefined') {
    void refreshDepartmentsFromServer();
  }
}, 45000);
Auth.enhanceUI();
</script>
